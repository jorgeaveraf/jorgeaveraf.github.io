<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Jorge Vera's professional CV – Data Engineer, Workflow Automation Specialist and AI Systems Architect." />
  <title>Jorge Vera – CV</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Side navigation dots (desktop) -->
  <nav id="side-nav" aria-label="Section navigation"></nav>

  <!-- Main content wrapper -->
  <main class="page-wrapper">

    <!-- Each slot is populated by main.js via fetch() -->
    <div id="slot-header"></div>
    <div id="slot-experiencia"></div>
    <div id="slot-educacion"></div>
    <div id="slot-skills"></div>
    <div id="slot-certificaciones"></div>
    <div id="slot-intereses"></div>
    <div id="slot-lenguajes"></div>

  </main>

  <!-- Scroll-to-top button -->
  <button id="scroll-top" aria-label="Back to top">↑</button>

  <!-- Dark / Light mode toggle -->
  <button id="theme-toggle" aria-label="Switch to light mode">🌙</button>

  <script src="main.js"></script>
</body>
</html>
